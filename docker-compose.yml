version: "3"
services:
  postal:
    image: ${POSTAL_IMAGE}
    depends_on:
      - mariadb
      - rabbitmq
      - rspamd
    entrypoint: ["/docker-entrypoint.sh"]
    volumes:
      - "./docker/ci-config:/config"
    environment:
      POSTAL_CONFIG_ROOT: /config
      KATAPULT_CONFIG_FILE: /ci-config.yml
      WAIT_FOR_TIMEOUT: 90
      WAIT_FOR_TARGETS: |-
        mariadb:3306
        rabbitmq:5672
        rspamd:11334

  mariadb:
    image: mariadb
    restart: always
    environment:
      MARIADB_DATABASE: postal
      MARIADB_ALLOW_EMPTY_PASSWORD: 'yes'
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'

  rabbitmq:
    image: rabbitmq:3
    restart: always

  rspamd:
    image: rspamd/rspamd
    restart: always
    ports:
      - "11333:11333"
      - "11334:11334"
      - "11335:11335"
    volumes:
      - ./rspamd:/etc/rspamd
