# Main configuration file for rspamd
options {
    # Automatically learn spam and ham
    autolearn = true;
    autolearn_conf = {
        spam_threshold = 6;
        ham_threshold = -0.5;
        autolearn = true;
    }

    # Enable logging
    log_level = info;
    logger {
        type = file;
        filename = "/var/log/rspamd/rspamd.log";
    }

    # Enable Bayesian classifier
    classifier "bayes" {
        backend = "sqlite3";
        database = "/var/lib/rspamd/bayes.db";
        autolearn = true;
        min_tokens = 11;
    }
}

# Include additional configurations
.include(try=true; priority=1) "/etc/rspamd/local.d/*.conf"
.include(try=true; priority=10) "/etc/rspamd/override.d/*.conf"
